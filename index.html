<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Ferramentas | FUSP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #008771; /* Verde FUSP */
            --secondary-color: #f0f9f6;
            --text-color: #2d3436;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        header { text-align: center; margin-bottom: 50px; }

        .logo-area {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--primary-color); color: white;
            width: 80px; height: 80px; border-radius: 20px;
            font-size: 40px; font-weight: 700; margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0, 135, 113, 0.2);
        }

        h1 { font-size: 2.2rem; color: var(--primary-color); letter-spacing: -1px; }
        p.subtitle { color: #636e72; margin-top: 10px; font-weight: 300; }

        .container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; max-width: 1100px; width: 100%;
        }

        .card {
            background: var(--card-bg); border-radius: 16px; padding: 30px;
            text-decoration: none; color: inherit; transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05); display: flex;
            flex-direction: column; align-items: flex-start;
        }

        .card:hover {
            transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .card i {
            font-size: 30px; color: var(--primary-color); margin-bottom: 20px;
            background: var(--secondary-color); width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center; border-radius: 12px;
        }

        .card h3 { font-size: 1.15rem; margin-bottom: 10px; font-weight: 600; }
        .card p { font-size: 0.9rem; color: #636e72; line-height: 1.5; }

        .card .btn-go {
            margin-top: 20px; font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; color: var(--primary-color);
            display: flex; align-items: center; gap: 8px;
        }

        #loading { color: #636e72; font-style: italic; }

        footer { margin-top: auto; padding: 40px; font-size: 0.85rem; color: #b2bec3; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">F</div>
        <h1>Portal de Aplicativos</h1>
        <p class="subtitle">Ferramentas Fuspianas para auxilio nas prestações de contas - Made By Anderson Oliveira</p>
    </header>

    <div class="container" id="tools-container">
        <p id="loading"><i class="fa-solid fa-spinner fa-spin"></i> Carregando ferramentas...</p>
    </div>

    <footer>
        &copy; FUSP | Painel Interno de Controle
    </footer>

    <script>
        // Configurações do seu repositório
        const username = 'andersonmusicbd';
        const repo = 'FUSP';

        async function loadTools() {
            const container = document.getElementById('tools-container');
            
            try {
                // Busca a lista de arquivos direto da API pública do GitHub
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const files = await response.json();
                
                // Limpa o texto de carregando
                container.innerHTML = '';

                // Filtra para pegar apenas arquivos .html e ignora o index.html
                const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');

                if(htmlFiles.length === 0) {
                    container.innerHTML = '<p>Nenhuma ferramenta encontrada.</p>';
                    return;
                }

                // Cria o card para cada arquivo encontrado
                htmlFiles.forEach(file => {
                    // Remove o ".html" do nome para ficar mais limpo no título do card
                    const cleanName = file.name.replace('.html', '');
                    
                    // Define um ícone genérico baseado em palavras-chave do nome do arquivo
                    let icon = 'fa-file-code';
                    if (file.name.toLowerCase().includes('reais') || file.name.toLowerCase().includes('cc')) icon = 'fa-money-bill-transfer';
                    if (file.name.toLowerCase().includes('extrato')) icon = 'fa-file-invoice-dollar';
                    if (file.name.toLowerCase().includes('pdf') || file.name.toLowerCase().includes('rendimento')) icon = 'fa-file-pdf';
                    if (file.name.toLowerCase().includes('lançado') || file.name.toLowerCase().includes('pc')) icon = 'fa-magnifying-glass-chart';

                    const cardHtml = `
                        <a href="${encodeURIComponent(file.name)}" class="card">
                            <i class="fa-solid ${icon}"></i>
                            <h3>${cleanName}</h3>
                            <p>Clique para abrir o aplicativo utilitário.</p>
                            <div class="btn-go">Abrir Ferramenta <i class="fa-solid fa-arrow-right"></i></div>
                        </a>
                    `;
                    container.innerHTML += cardHtml;
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = '<p>Erro ao carregar as ferramentas. Tente atualizar a página.</p>';
            }
        }

        // Executa a função ao carregar a página
        loadTools();
    </script>
</body>
</html>
