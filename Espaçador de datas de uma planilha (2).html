<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaçador de Datas Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans p-6">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-md border border-slate-200 mt-10">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Espaçador de Datas 📅</h1>
            <p class="text-slate-500 mt-2">Insira linhas em branco mantendo fórmulas, estilos e a integridade da sua planilha.</p>
        </header>

        <div class="mb-6 p-4 bg-slate-50 rounded-xl border border-slate-200">
            <label class="block text-sm font-bold text-slate-700 mb-2">1. Selecione a sua planilha (.xlsx, .xls ou .csv):</label>
            <input type="file" id="inputPlanilha" accept=".xlsx, .xls, .csv" 
                   class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" />
        </div>

        <div id="configContainer" class="hidden mb-6 p-4 bg-blue-50/50 rounded-xl border border-blue-100 space-y-4">
            <h3 class="text-sm font-bold text-blue-900 uppercase">2. Configurações</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Qual coluna contém as datas?</label>
                    <select id="selectColunaData" class="w-full text-sm p-2 rounded border border-slate-300 bg-white font-mono"></select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Quantas linhas vazias inserir?</label>
                    <input type="number" id="numLinhas" value="1" min="1" max="10" class="w-full text-sm p-2 rounded border border-slate-300 bg-white" />
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center mt-8">
            <button id="btnProcessar" onclick="processarPlanilha()" disabled
                    class="bg-slate-200 text-slate-400 font-bold py-3 px-6 rounded-xl transition-all cursor-not-allowed w-full sm:w-auto">
                ⚙️ 1. Processar Planilha
            </button>

            <button id="btnDownload" onclick="baixarPlanilha()" disabled
                    class="bg-slate-200 text-slate-400 font-bold py-3 px-6 rounded-xl transition-all cursor-not-allowed w-full sm:w-auto">
                📥 2. Baixar Arquivo Alterado
            </button>
        </div>

        <div id="statusMsg" class="mt-6 text-center text-sm font-semibold hidden p-3 rounded-lg"></div>
    </div>

    <script>
        let workbookOriginal = null;
        let sheetNameOriginal = null;
        let workbookProcessado = null;

        // Ouvinte para upload do arquivo
        document.getElementById('inputPlanilha').addEventListener('change', function(e) {
            const arquivo = e.target.files[0];
            if (!arquivo) return;

            // Reseta estados caso o usuário suba um novo arquivo
            bloquearBotaoDownload();

            const leitor = new FileReader();
            
            leitor.onload = function(evento) {
                try {
                    const dadosBinarios = evento.target.result;
                    
                    // Lê o arquivo trazendo as fórmulas (cellFormula: true)
                    workbookOriginal = XLSX.read(dadosBinarios, { type: 'array', cellDates: true, cellFormula: true });
                    sheetNameOriginal = workbookOriginal.SheetNames[0];
                    const aba = workbookOriginal.Sheets[sheetNameOriginal];
                    
                    const dadosTemporarios = XLSX.utils.sheet_to_json(aba, { header: 1, defval: "" });

                    if (dadosTemporarios.length <= 1) {
                        mostrarMensagem("A planilha parece estar vazia ou sem cabeçalhos.", "erro");
                        return;
                    }

                    popularDropdown(dadosTemporarios[0]);

                    // Mostra as configurações na tela
                    document.getElementById('configContainer').classList.remove('hidden');
                    
                    // Ativa o botão de Processar
                    ativarBotaoProcessar();

                    mostrarMensagem("Arquivo carregado com sucesso! Defina as configurações e clique em '1. Processar Planilha'.", "sucesso");

                } catch (erro) {
                    console.error(erro);
                    mostrarMensagem("Erro ao ler o arquivo Excel. Verifique se ele não está corrompido.", "erro");
                }
            };

            leitor.readAsArrayBuffer(arquivo);
        });

        function popularDropdown(colunas) {
            const select = document.getElementById('selectColunaData');
            select.innerHTML = '';
            
            let indicePreSelecionado = 0;
            colunas.forEach((col, index) => {
                const option = document.createElement('option');
                option.value = index;
                const letra = XLSX.utils.encode_col(index);
                option.text = col ? `${letra} - ${col}` : `${letra} - (Coluna vazia)`;
                select.appendChild(option);

                const colS = String(col).toLowerCase().trim();
                if (colS === 'dat' || colS === 'data' || colS.startsWith('dat') || colS.includes('data')) {
                    indicePreSelecionado = index;
                }
            });
            select.selectedIndex = indicePreSelecionado;
        }

        function obterValorFormatadoData(celula) {
            if (!celula) return "";
            let valor = celula.v;
            if (celula.t === 'd' || (valor instanceof Date && !isNaN(valor.getTime()))) {
                const data = new Date(valor);
                const dia = String(data.getDate()).padStart(2, '0');
                const mes = String(data.getMonth() + 1).padStart(2, '0');
                const ano = data.getFullYear();
                return `${dia}/${mes}/${ano}`;
            }
            return String(valor || "").trim();
        }

        function processarPlanilha() {
            if (!workbookOriginal) return;

            // Bloqueia o download preventivamente enquanto processa
            bloquearBotaoDownload();

            const abaOriginal = workbookOriginal.Sheets[sheetNameOriginal];
            const colIndex = parseInt(document.getElementById('selectColunaData').value);
            const numEspacos = parseInt(document.getElementById('numLinhas').value) || 1;

            const range = XLSX.utils.decode_range(abaOriginal['!ref']);
            const totalColunas = range.e.c - range.s.c + 1;
            const totalLinhasOriginal = range.e.r - range.s.r + 1;

            let novaAba = { '!ref': '' };
            let rNova = 0; 
            let ultimaData = null;

            // Copia o cabeçalho
            for (let c = 0; c < totalColunas; c++) {
                const refAntiga = XLSX.utils.encode_cell({ r: 0, c: c });
                if (abaOriginal[refAntiga]) {
                    const refNova = XLSX.utils.encode_cell({ r: 0, c: c });
                    novaAba[refNova] = { ...abaOriginal[refAntiga] }; 
                }
            }
            rNova++;

            // Processa linha a linha copiando valores e fórmulas
            for (let r = 1; r < totalLinhasOriginal; r++) {
                const refCelulaData = XLSX.utils.encode_cell({ r: r, c: colIndex });
                const celulaData = abaOriginal[refCelulaData];
                const dataFormatada = obterValorFormatadoData(celulaData);

                let linhaEstaVazia = true;
                for (let c = 0; c < totalColunas; c++) {
                    const refC = XLSX.utils.encode_cell({ r: r, c: c });
                    if (abaOriginal[refC] && abaOriginal[refC].v !== undefined && abaOriginal[refC].v !== "") {
                        linhaEstaVazia = false;
                        break;
                    }
                }

                if (r > 1 && !linhaEstaVazia && dataFormatada !== "" && ultimaData !== null && dataFormatada !== ultimaData) {
                    rNova += numEspacos; // Pula as linhas (espaço em branco)
                }

                for (let c = 0; c < totalColunas; c++) {
                    const refAntiga = XLSX.utils.encode_cell({ r: r, c: c });
                    if (abaOriginal[refAntiga]) {
                        const refNova = XLSX.utils.encode_cell({ r: rNova, c: c });
                        novaAba[refNova] = { ...abaOriginal[refAntiga] }; 
                    }
                }

                if (!linhaEstaVazia && dataFormatada !== "") {
                    ultimaData = dataFormatada;
                }

                rNova++;
            }

            range.e.r = rNova - 1;
            novaAba['!ref'] = XLSX.utils.encode_range(range);

            workbookProcessado = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbookProcessado, novaAba, sheetNameOriginal || "Planilha");

            // Ativa o botão de Download agora que o arquivo existe
            ativarBotaoDownload();

            mostrarMensagem("Planilha processada com sucesso! Suas fórmulas foram preservadas nas linhas. Clique abaixo para baixar.", "sucesso");
        }

        function baixarPlanilha() {
            if (!workbookProcessado) return;

            try {
                XLSX.writeFile(workbookProcessado, "planilha_com_espacos_e_formulas.xlsx");
                mostrarMensagem("Download concluído com sucesso!", "sucesso");
            } catch (erro) {
                console.error(erro);
                mostrarMensagem("Erro ao exportar o arquivo.", "erro");
            }
        }

        // Funções de Controle dos Botões
        function ativarBotaoProcessar() {
            const btn = document.getElementById('btnProcessar');
            btn.removeAttribute('disabled');
            btn.className = "bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow transition-all cursor-pointer w-full sm:w-auto";
        }

        function ativarBotaoDownload() {
            const btn = document.getElementById('btnDownload');
            btn.removeAttribute('disabled');
            btn.className = "bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl shadow transition-all cursor-pointer w-full sm:w-auto";
        }

        function bloquearBotaoDownload() {
            const btn = document.getElementById('btnDownload');
            btn.setAttribute('disabled', 'true');
            btn.className = "bg-slate-200 text-slate-400 font-bold py-3 px-6 rounded-xl transition-all cursor-not-allowed w-full sm:w-auto";
            workbookProcessado = null;
        }

        function mostrarMensagem(texto, tipo) {
            const msgDiv = document.getElementById('statusMsg');
            msgDiv.innerText = texto;
            msgDiv.classList.remove('hidden', 'bg-red-100', 'text-red-800', 'bg-green-100', 'text-green-800');
            
            if (tipo === "erro") {
                msgDiv.classList.add('bg-red-100', 'text-red-800');
            } else {
                msgDiv.classList.add('bg-green-100', 'text-green-800');
            }
            msgDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
