					<div style="transform:rotateX(180deg)" class="copy-btn" title="" aria-label="Copiar texto" role="button" tabindex="0" data-clipboard-target="#text" data-original-title="Copiar">
						<svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M16,20H5V6H3v14c0,1.1,0.9,2,2,2h11V20z M20,16V4c0-1.1-0.9-2-2-2H9C7.9,2,7,2.9,7,4v12c0,1.1,0.9,2,2,2h9 C19.1,18,20,17.1,20,16z M18,16H9V4h9V16z"></path></svg>

<script>
function run(){

	$('.numero').number(true, 2, ',', '.');

	// corrige bug da máscara input
	$('.numero').bind('paste', function(e){
		var pastedData = e.originalEvent.clipboardData.getData('text');
		if(/\.\d*,/.test(pastedData)){
			$(this).val(pastedData.replace(/\./g,'').replace(',','.'));
			console.log(pastedData.replace(/\./g,'').replace(',','.'))
		}
	});

	// Tooltip
	$('.copy-btn').tooltip({
		trigger: 'manual',
		placement: 'bottom'
	});

	function setTooltip(btn, message) {
		btn.attr('data-original-title', message).tooltip('show');
	}

	function hideTooltip(btn) {
		setTimeout(function() {
			btn.tooltip('hide');
		}, 1000);
	}

	// Clipboard
	var clipboard = new ClipboardJS('.copy-btn');

	clipboard.on('success', function(e) {
		var btn = $(e.trigger);
		setTooltip(btn, 'Copiado');
		hideTooltip(btn);
		e.clearSelection();
	});

	$('.escrever').click(function(){
		var numero = $('.numero').val();
		var tipo = $('.options input[type="radio"]:checked').val()

		if(numero==''){
			$('#text').text('');
			$('.resultado').hide();
			return;
		}

		$(document).ajaxStart(function(){
			$('.escrever').attr('disabled',true);
		});
	
		$(document).ajaxStop(function(){
			$('.escrever').attr('disabled',false);
		});

		$.ajax({type:'get', url:'https://api.invertexto.com/v1/number-to-words?token=661|xqfbRfFda6qReBvlbBRhuX3hFw6DdQ1f&number='+numero+'&language=pt&currency=BRL', dataType:'json',
            success:function(j){

				var text = tipo == 'mi' ? j.text : j.text.toUpperCase();
				$('#text').text(text);
				$('.resultado').show();
				$('#error').hide();

			},error:function(e){
				if(e.responseJSON != undefined){
                    $('#error').text(e.responseJSON.message).show();
                }else{
                    $('#error').text('Erro inesperado.').show();
                }
			}
		});
	});

	$('.numero').keydown(function(event){
		if(event.keyCode == 13)
			$('.escrever').click();
	});

	$('.options input').click(function(){
		var type = $('.options input[type="radio"]:checked').val();
		var current = $('#text').text();
		var text = type == 'mi' ? current.toLowerCase() : current.toUpperCase();
		$('#text').text(text);
	});
}
</script>
